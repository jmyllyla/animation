<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gallery</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      body {
        display: grid;
        place-items: center;
      }

      #viewport {
        position: relative;
        width: min(100vw, 800px, calc(100vh * 4 / 3));
        aspect-ratio: 4 / 3;
        max-width: 800px;
        max-height: 600px;
        overflow: hidden;
      }

      #loading {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0b0b0b;
        z-index: 2;
        transition: opacity 220ms ease;
      }

      #loading.is-hidden {
        opacity: 0;
        pointer-events: none;
      }

      #loading img {
        display: block;
        width: min(36vw, 320px);
        height: auto;
        max-height: 72vh;
        object-fit: contain;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: #000;
      }

      #touch-controls {
        position: absolute;
        right: 16px;
        bottom: 16px;
        display: grid;
        grid-template-columns: repeat(3, 56px);
        grid-template-rows: repeat(3, 56px);
        gap: 8px;
        z-index: 3;
        pointer-events: none;
      }

      .control-button {
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 16px;
        background: rgba(12, 12, 12, 0.72);
        color: #f3f0e8;
        font: 600 24px/1 system-ui, sans-serif;
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
        pointer-events: auto;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      .control-button.is-active {
        background: rgba(241, 238, 229, 0.92);
        color: #111;
        transform: translateY(1px);
      }

      .control-up {
        grid-column: 2;
        grid-row: 1;
      }

      .control-left {
        grid-column: 1;
        grid-row: 2;
      }

      .control-right {
        grid-column: 3;
        grid-row: 2;
      }

      .control-down {
        grid-column: 2;
        grid-row: 3;
      }

      @media (pointer: fine) and (min-width: 801px) {
        #touch-controls {
          display: none;
        }
      }

      @media (max-width: 520px) {
        #touch-controls {
          right: 12px;
          bottom: 12px;
          grid-template-columns: repeat(3, 50px);
          grid-template-rows: repeat(3, 50px);
          gap: 6px;
        }

        .control-button {
          border-radius: 14px;
          font-size: 22px;
        }
      }
    </style>
  </head>
  <body>
    <div id="viewport">
      <div id="loading">
        <img src="loading-artwork.jpg" alt="Loading artwork">
      </div>
      <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="0"></canvas>
      <div id="touch-controls" aria-label="Touch controls">
        <button class="control-button control-up" type="button" data-control="0" aria-label="Move forward">&uarr;</button>
        <button class="control-button control-left" type="button" data-control="2" aria-label="Turn left">&larr;</button>
        <button class="control-button control-right" type="button" data-control="3" aria-label="Turn right">&rarr;</button>
        <button class="control-button control-down" type="button" data-control="1" aria-label="Move backward">&darr;</button>
      </div>
    </div>

    <script>
      const loadingElement = document.getElementById('loading');
      const canvasElement = document.getElementById('canvas');
      const touchButtons = Array.from(document.querySelectorAll('.control-button'));
      const minimumLoadingDurationMs = 3000;
      const loadingStartedAt = Date.now();
      const scrollBlockingKeys = new Set([
        'ArrowUp',
        'ArrowDown',
        'ArrowLeft',
        'ArrowRight',
        ' ',
        'PageUp',
        'PageDown',
        'Home',
        'End'
      ]);
      const activePointers = new Map();
      const pressedControlCounts = new Map();
      let appReadyToShow = false;
      let loadingHidden = false;

      canvasElement.addEventListener('webglcontextlost', (event) => {
        console.error('WebGL context lost. Reload the page to restore it.');
        event.preventDefault();
      }, false);

      function focusCanvas() {
        try {
          canvasElement.focus({ preventScroll: true });
        } catch (error) {
          canvasElement.focus();
        }
      }

      function setVirtualControlState(control, isPressed) {
        if (typeof Module !== 'object') return;
        if (typeof Module._SetVirtualControlState !== 'function') return;
        Module._SetVirtualControlState(control, isPressed ? 1 : 0);
      }

      function syncAllVirtualControls() {
        for (const button of touchButtons) {
          const control = Number(button.dataset.control);
          setVirtualControlState(control, (pressedControlCounts.get(control) || 0) > 0);
        }
      }

      function resetVirtualControls() {
        if (typeof Module !== 'object') return;
        if (typeof Module._ResetVirtualControls !== 'function') return;
        Module._ResetVirtualControls();
      }

      function pressControl(button) {
        const control = Number(button.dataset.control);
        const nextCount = (pressedControlCounts.get(control) || 0) + 1;
        pressedControlCounts.set(control, nextCount);
        button.classList.add('is-active');

        if (nextCount === 1) {
          setVirtualControlState(control, true);
        }
      }

      function releaseControl(button) {
        const control = Number(button.dataset.control);
        const currentCount = pressedControlCounts.get(control) || 0;
        if (currentCount <= 0) return;

        const nextCount = currentCount - 1;
        if (nextCount === 0) {
          pressedControlCounts.delete(control);
          button.classList.remove('is-active');
          setVirtualControlState(control, false);
          return;
        }

        pressedControlCounts.set(control, nextCount);
      }

      function releaseAllControls() {
        for (const button of activePointers.values()) {
          releaseControl(button);
        }

        activePointers.clear();
        resetVirtualControls();
      }

      function handleControlStart(event) {
        const button = event.currentTarget;
        if (activePointers.has(event.pointerId)) return;

        event.preventDefault();
        focusCanvas();
        activePointers.set(event.pointerId, button);
        button.setPointerCapture(event.pointerId);
        pressControl(button);
      }

      function handleControlEnd(event) {
        const button = activePointers.get(event.pointerId);
        if (!button) return;

        event.preventDefault();
        activePointers.delete(event.pointerId);
        releaseControl(button);
      }

      window.addEventListener('pointerdown', focusCanvas, { passive: true });
      window.addEventListener('touchstart', focusCanvas, { passive: true });
      window.addEventListener('blur', releaseAllControls);
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) releaseAllControls();
      });
      window.addEventListener('keydown', (event) => {
        if (scrollBlockingKeys.has(event.key)) {
          event.preventDefault();
          focusCanvas();
        }
      }, { capture: true });

      for (const button of touchButtons) {
        button.addEventListener('pointerdown', handleControlStart);
        button.addEventListener('pointerup', handleControlEnd);
        button.addEventListener('pointercancel', handleControlEnd);
        button.addEventListener('lostpointercapture', handleControlEnd);
        button.addEventListener('contextmenu', (event) => event.preventDefault());
      }

      focusCanvas();

      function hideLoading() {
        if (loadingHidden) return;
        loadingHidden = true;
        loadingElement.classList.add('is-hidden');
      }

      function tryHideLoading() {
        if (!appReadyToShow) return;

        const elapsed = Date.now() - loadingStartedAt;
        const remaining = minimumLoadingDurationMs - elapsed;

        if (remaining > 0) {
          window.setTimeout(hideLoading, remaining);
          return;
        }

        hideLoading();
      }

      function markAppReady() {
        if (appReadyToShow) return;
        appReadyToShow = true;
        tryHideLoading();
      }

      var Module = {
        canvas: canvasElement,
        print(...args) {
          console.log(...args);
        },
        setStatus(text) {
          if (text) console.log(text);
        },
        totalDependencies: 0,
        monitorRunDependencies(left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          if (left === 0) markAppReady();
        },
        onRuntimeInitialized() {
          syncAllVirtualControls();
          markAppReady();
        }
      };

      window.onerror = (message) => {
        console.error(message);
      };
    </script>
    {{{ SCRIPT }}}
  </body>
</html>
