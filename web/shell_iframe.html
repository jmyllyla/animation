<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gallery</title>
    <style>
      :root {
        --page-bg: #e2ddd5;
        --loading-bg: #e8e3dc;
        --debug-bg: rgba(247, 243, 236, 0.84);
        --debug-border: rgba(74, 68, 60, 0.12);
        --debug-text: rgba(58, 54, 48, 0.9);
        --debug-muted: rgba(92, 86, 79, 0.68);
        --control-bg: rgba(56, 52, 47, 0.68);
      }

      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--page-bg);
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
      }

      body {
        display: grid;
        place-items: center;
      }

      #viewport {
        position: relative;
        width: min(100vw, 800px, calc(100vh * 4 / 3));
        aspect-ratio: 4 / 3;
        max-width: 800px;
        max-height: 600px;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
      }

      #loading {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        gap: 14px;
        align-items: center;
        justify-content: center;
        background: var(--loading-bg);
        z-index: 2;
        transition: opacity 420ms ease;
      }

      #loading.is-hidden {
        opacity: 0;
        pointer-events: none;
      }

      #loading img {
        display: block;
        width: min(36vw, 320px);
        height: auto;
        max-height: 72vh;
        object-fit: contain;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      }

      #loading-label {
        color: rgba(57, 52, 47, 0.88);
        font: 500 14px/1.3 system-ui, sans-serif;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      #loading-debug {
        display: none;
        width: min(82vw, 440px);
        padding: 10px 12px;
        border: 1px solid var(--debug-border);
        border-radius: 12px;
        background: var(--debug-bg);
        color: var(--debug-text);
        font: 500 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        text-align: left;
      }

      #loading.is-debug #loading-debug {
        display: block;
      }

      .loading-debug-line {
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 1.45em;
      }

      .loading-debug-line + .loading-debug-line {
        margin-top: 2px;
      }

      .loading-debug-line.is-gap {
        min-height: 8px;
      }

      .loading-debug-marker {
        width: 10px;
        flex: 0 0 10px;
        color: rgba(92, 86, 79, 0.74);
      }

      .loading-debug-text {
        flex: 1 1 auto;
      }

      .loading-debug-time {
        color: var(--debug-muted);
      }

      .loading-debug-cursor {
        width: 10px;
        height: 14px;
        border-radius: 1px;
        background: rgba(84, 77, 69, 0.8);
        box-shadow: 0 0 0 1px rgba(84, 77, 69, 0.14);
        animation: loading-debug-cursor-blink 1s steps(1, end) infinite;
      }

      @keyframes loading-debug-cursor-blink {
        0%, 49% {
          opacity: 1;
        }

        50%, 100% {
          opacity: 0;
        }
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: var(--page-bg);
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
      }

      #touch-controls {
        position: absolute;
        right: 6px;
        bottom: 6px;
        display: grid;
        grid-template-columns: repeat(3, 52px);
        grid-template-rows: repeat(2, 52px);
        gap: 2px;
        z-index: 3;
        pointer-events: none;
        opacity: 0;
        visibility: hidden;
        transition: opacity 180ms ease;
      }

      #viewport.is-ready #touch-controls {
        opacity: 1;
        visibility: visible;
      }

      .control-button {
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 16px;
        background: var(--control-bg);
        color: #f3f0e8;
        font: 600 24px/1 system-ui, sans-serif;
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
        pointer-events: auto;
        touch-action: none;
        appearance: none;
        -webkit-appearance: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        -webkit-user-drag: none;
        -webkit-tap-highlight-color: transparent;
      }

      .control-button.is-active {
        background: rgba(241, 238, 229, 0.92);
        color: #111;
        transform: translateY(1px);
      }

      .control-turn-left {
        grid-column: 1;
        grid-row: 1;
      }

      .control-forward {
        grid-column: 2;
        grid-row: 1;
      }

      .control-turn-right {
        grid-column: 3;
        grid-row: 1;
      }

      .control-step-left {
        grid-column: 1;
        grid-row: 2;
      }

      .control-backward {
        grid-column: 2;
        grid-row: 2;
      }

      .control-step-right {
        grid-column: 3;
        grid-row: 2;
      }

      @media (pointer: fine) and (min-width: 801px) {
        #touch-controls {
          display: none;
        }
      }

      @media (max-width: 520px) {
        #touch-controls {
          right: 5px;
          bottom: 5px;
          grid-template-columns: repeat(3, 46px);
          grid-template-rows: repeat(2, 46px);
          gap: 2px;
        }

        .control-button {
          border-radius: 14px;
          font-size: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div id="viewport">
      <div id="loading">
        <img src="loading-artwork.jpg" alt="Loading artwork">
        <div id="loading-label">Loading gallery...</div>
        <div id="loading-debug" aria-live="polite"></div>
      </div>
      <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="0"></canvas>
      <div id="touch-controls" aria-label="Touch controls">
        <button class="control-button control-turn-left" type="button" data-control="2" aria-label="Turn left">&#8634;</button>
        <button class="control-button control-forward" type="button" data-control="0" aria-label="Move forward">&uarr;</button>
        <button class="control-button control-turn-right" type="button" data-control="3" aria-label="Turn right">&#8635;</button>
        <button class="control-button control-step-left" type="button" data-control="4" aria-label="Step left">&larr;</button>
        <button class="control-button control-backward" type="button" data-control="1" aria-label="Move backward">&darr;</button>
        <button class="control-button control-step-right" type="button" data-control="5" aria-label="Step right">&rarr;</button>
      </div>
    </div>

    <script>
      const viewportElement = document.getElementById('viewport');
      const loadingElement = document.getElementById('loading');
      const loadingImageElement = loadingElement.querySelector('img');
      const loadingLabelElement = document.getElementById('loading-label');
      const loadingDebugElement = document.getElementById('loading-debug');
      const canvasElement = document.getElementById('canvas');
      const touchButtons = Array.from(document.querySelectorAll('.control-button'));
      const loaderParams = new URLSearchParams(window.location.search);
      const loaderDebugEnabled = loaderParams.get('loader-debug') === '1';
      const loaderHideStage = normalizeLoaderHideStage(loaderParams.get('loader-hide-stage'));
      const loaderHoldMs = parseLoaderDelayMs(loaderParams.get('loader-hold-ms'));
      const loaderStartTime = performance.now();
      const loaderStageOrder = [
        'shell-ready',
        'loading-artwork-ready',
        'dependencies-complete',
        'runtime-initialized',
        'native-assets-loaded',
        'first-frame'
      ];
      const loaderStageLabels = {
        'shell-ready': 'Shell ready',
        'loading-artwork-ready': 'Splash artwork visible',
        'dependencies-complete': 'Web dependencies complete',
        'runtime-initialized': 'Runtime initialized',
        'native-assets-loaded': 'Native assets loaded',
        'first-frame': 'First gallery frame drawn'
      };
      const loaderStatusLabels = {
        'shell-ready': 'Loading gallery...',
        'loading-artwork-ready': 'Loading gallery...',
        'dependencies-complete': 'Starting gallery...',
        'runtime-initialized': 'Preparing artwork...',
        'native-assets-loaded': 'Rendering gallery...',
        'first-frame': 'Opening gallery...'
      };
      const scrollBlockingKeys = new Set([
        'ArrowUp',
        'ArrowDown',
        'ArrowLeft',
        'ArrowRight',
        ' ',
        'PageUp',
        'PageDown',
        'Home',
        'End'
      ]);
      const activePointers = new Map();
      const pressedControlCounts = new Map();
      const recordedLoaderStages = new Map();
      let loadingHidden = false;
      let hideSignalReceived = false;
      let hideScheduled = false;

      if (loaderDebugEnabled) {
        loadingElement.classList.add('is-debug');
      }

      canvasElement.addEventListener('webglcontextlost', (event) => {
        console.error('WebGL context lost. Reload the page to restore it.');
        event.preventDefault();
      }, false);

      function parseLoaderDelayMs(value) {
        const parsed = Number.parseInt(value || '', 10);
        if (!Number.isFinite(parsed) || parsed < 0) return 0;
        return parsed;
      }

      function normalizeLoaderHideStage(value) {
        const normalized = (value || 'frame').trim().toLowerCase();
        switch (normalized) {
          case 'deps':
          case 'dependencies':
            return 'dependencies-complete';
          case 'init':
          case 'runtime':
          case 'runtime-ready':
            return 'runtime-ready';
          case 'assets':
          case 'native-assets':
            return 'native-assets-loaded';
          case 'frame':
          case 'first-frame':
            return 'first-frame';
          case 'image':
          case 'artwork':
            return 'loading-artwork-ready';
          default:
            return 'first-frame';
        }
      }

      function getLoaderHideStageLabel() {
        switch (loaderHideStage) {
          case 'dependencies-complete': return 'Hide on web dependencies complete';
          case 'runtime-ready': return 'Hide on runtime ready';
          case 'native-assets-loaded': return 'Hide on native assets loaded';
          case 'first-frame': return 'Hide on first gallery frame';
          case 'loading-artwork-ready': return 'Hide when splash artwork is ready';
          default: return 'Hide on runtime ready';
        }
      }

      function formatLoaderTime(ms) {
        return `${(ms/1000).toFixed(ms < 10000 ? 1 : 0)}s`;
      }

      function updateLoadingLabel(stage) {
        loadingLabelElement.textContent = loaderStatusLabels[stage] || 'Loading gallery...';
      }

      function appendLoadingDebugLine(fragment, marker, text, timeText, showCursor) {
        const line = document.createElement('div');
        line.className = 'loading-debug-line';

        const markerElement = document.createElement('span');
        markerElement.className = 'loading-debug-marker';
        markerElement.textContent = marker;
        line.appendChild(markerElement);

        const textElement = document.createElement('span');
        textElement.className = 'loading-debug-text';
        textElement.textContent = text;
        line.appendChild(textElement);

        if (timeText) {
          const timeElement = document.createElement('span');
          timeElement.className = 'loading-debug-time';
          timeElement.textContent = timeText;
          line.appendChild(timeElement);
        }

        if (showCursor) {
          const cursorElement = document.createElement('span');
          cursorElement.className = 'loading-debug-cursor';
          cursorElement.setAttribute('aria-hidden', 'true');
          line.appendChild(cursorElement);
        }

        fragment.appendChild(line);
      }

      function renderLoaderDebug() {
        if (!loaderDebugEnabled) return;

        const fragment = document.createDocumentFragment();
        let activeMissingStage = null;

        for (const stage of loaderStageOrder) {
          if (!recordedLoaderStages.has(stage)) {
            activeMissingStage = stage;
            break;
          }
        }

        appendLoadingDebugLine(fragment, '', getLoaderHideStageLabel(), '', false);
        appendLoadingDebugLine(
          fragment,
          '',
          loaderHoldMs > 0 ? `Extra hold: ${loaderHoldMs} ms` : 'Extra hold: none',
          '',
          false);

        const gapLine = document.createElement('div');
        gapLine.className = 'loading-debug-line is-gap';
        gapLine.setAttribute('aria-hidden', 'true');
        fragment.appendChild(gapLine);

        for (const stage of loaderStageOrder) {
          const elapsed = recordedLoaderStages.get(stage);
          const prefix = elapsed === undefined ? '·' : '✓';
          const timeText = elapsed === undefined ? '' : formatLoaderTime(elapsed);
          appendLoadingDebugLine(
            fragment,
            prefix,
            loaderStageLabels[stage],
            timeText,
            stage === activeMissingStage);
        }

        loadingDebugElement.replaceChildren(fragment);
      }

      function isHideStageSatisfied(stage) {
        if (loaderHideStage === 'runtime-ready') {
          return stage === 'dependencies-complete' || stage === 'runtime-initialized';
        }

        return stage === loaderHideStage;
      }

      function recordLoaderStage(stage) {
        if (recordedLoaderStages.has(stage)) return;

        const elapsed = performance.now() - loaderStartTime;
        recordedLoaderStages.set(stage, elapsed);
        console.log(`[loader] ${stage} ${elapsed.toFixed(0)}ms`);
        updateLoadingLabel(stage);
        renderLoaderDebug();

        if (isHideStageSatisfied(stage)) {
          hideSignalReceived = true;
          tryHideLoading();
        }
      }

      function focusCanvas() {
        try {
          canvasElement.focus({ preventScroll: true });
        } catch (error) {
          canvasElement.focus();
        }
      }

      function clearSelection() {
        const selection = window.getSelection ? window.getSelection() : null;
        if (selection && selection.rangeCount > 0) {
          selection.removeAllRanges();
        }
      }

      function preventTouchBehavior(event) {
        event.preventDefault();
        clearSelection();
      }

      function setVirtualControlState(control, isPressed) {
        if (typeof Module !== 'object') return;
        if (typeof Module._SetVirtualControlState !== 'function') return;
        Module._SetVirtualControlState(control, isPressed ? 1 : 0);
      }

      function syncAllVirtualControls() {
        for (const button of touchButtons) {
          const control = Number(button.dataset.control);
          setVirtualControlState(control, (pressedControlCounts.get(control) || 0) > 0);
        }
      }

      function resetVirtualControls() {
        if (typeof Module !== 'object') return;
        if (typeof Module._ResetVirtualControls !== 'function') return;
        Module._ResetVirtualControls();
      }

      function pressControl(button) {
        const control = Number(button.dataset.control);
        const nextCount = (pressedControlCounts.get(control) || 0) + 1;
        pressedControlCounts.set(control, nextCount);
        button.classList.add('is-active');

        if (nextCount === 1) {
          setVirtualControlState(control, true);
        }
      }

      function releaseControl(button) {
        const control = Number(button.dataset.control);
        const currentCount = pressedControlCounts.get(control) || 0;
        if (currentCount <= 0) return;

        const nextCount = currentCount - 1;
        if (nextCount === 0) {
          pressedControlCounts.delete(control);
          button.classList.remove('is-active');
          setVirtualControlState(control, false);
          return;
        }

        pressedControlCounts.set(control, nextCount);
      }

      function releaseAllControls() {
        for (const button of activePointers.values()) {
          releaseControl(button);
        }

        activePointers.clear();
        resetVirtualControls();
      }

      function handleControlStart(event) {
        const button = event.currentTarget;
        if (activePointers.has(event.pointerId)) return;

        event.preventDefault();
        clearSelection();
        focusCanvas();
        activePointers.set(event.pointerId, button);
        button.setPointerCapture(event.pointerId);
        pressControl(button);
      }

      function handleControlEnd(event) {
        const button = activePointers.get(event.pointerId);
        if (!button) return;

        event.preventDefault();
        activePointers.delete(event.pointerId);
        releaseControl(button);
        clearSelection();
      }

      window.addEventListener('pointerdown', focusCanvas, { passive: true });
      window.addEventListener('touchstart', focusCanvas, { passive: true });
      window.addEventListener('blur', releaseAllControls);
      document.addEventListener('selectionchange', clearSelection);
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) releaseAllControls();
      });
      window.addEventListener('keydown', (event) => {
        if (scrollBlockingKeys.has(event.key)) {
          event.preventDefault();
          focusCanvas();
        }
      }, { capture: true });

      for (const button of touchButtons) {
        button.addEventListener('pointerdown', handleControlStart);
        button.addEventListener('pointerup', handleControlEnd);
        button.addEventListener('pointercancel', handleControlEnd);
        button.addEventListener('lostpointercapture', handleControlEnd);
        button.addEventListener('touchstart', preventTouchBehavior, { passive: false });
        button.addEventListener('touchmove', preventTouchBehavior, { passive: false });
        button.addEventListener('touchend', preventTouchBehavior, { passive: false });
        button.addEventListener('touchcancel', preventTouchBehavior, { passive: false });
        button.addEventListener('dragstart', (event) => event.preventDefault());
        button.addEventListener('selectstart', (event) => event.preventDefault());
        button.addEventListener('contextmenu', (event) => event.preventDefault());
      }

      focusCanvas();

      function hideLoading() {
        if (loadingHidden) return;
        loadingHidden = true;
        loadingElement.classList.add('is-hidden');
        viewportElement.classList.add('is-ready');
      }

      function tryHideLoading() {
        if (!hideSignalReceived || loadingHidden || hideScheduled) return;

        hideScheduled = true;
        const finishHide = () => {
          hideScheduled = false;
          hideLoading();
        };

        if (loaderHoldMs > 0) {
          window.setTimeout(finishHide, loaderHoldMs);
          return;
        }

        finishHide();
      }

      window.__galleryLoaderStage = recordLoaderStage;
      window.galleryLoaderDebug = {
        get hideStage() { return loaderHideStage; },
        get holdMs() { return loaderHoldMs; },
        get timeline() {
          return loaderStageOrder
            .filter((stage) => recordedLoaderStages.has(stage))
            .map((stage) => ({
              stage,
              label: loaderStageLabels[stage],
              elapsedMs: recordedLoaderStages.get(stage)
            }));
        }
      };

      var Module = {
        canvas: canvasElement,
        print(...args) {
          console.log(...args);
        },
        setStatus(text) {
          if (text) console.log(text);
        },
        totalDependencies: 0,
        monitorRunDependencies(left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          if (left === 0) recordLoaderStage('dependencies-complete');
        },
        onRuntimeInitialized() {
          syncAllVirtualControls();
          recordLoaderStage('runtime-initialized');
        }
      };

      if (loadingImageElement.complete) {
        recordLoaderStage('loading-artwork-ready');
      } else {
        loadingImageElement.addEventListener('load', () => recordLoaderStage('loading-artwork-ready'), { once: true });
        loadingImageElement.addEventListener('error', () => recordLoaderStage('loading-artwork-ready'), { once: true });
      }

      recordLoaderStage('shell-ready');
      renderLoaderDebug();

      window.onerror = (message) => {
        console.error(message);
      };
    </script>
    {{{ SCRIPT }}}
  </body>
</html>
