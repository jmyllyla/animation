<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gallery</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      body {
        display: grid;
        place-items: center;
      }

      #viewport {
        position: relative;
        width: min(100vw, 800px, calc(100vh * 4 / 3));
        aspect-ratio: 4 / 3;
        max-width: 800px;
        max-height: 600px;
        overflow: hidden;
      }

      #loading {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0b0b0b;
        z-index: 2;
        transition: opacity 220ms ease;
      }

      #loading.is-hidden {
        opacity: 0;
        pointer-events: none;
      }

      #loading img {
        display: block;
        width: min(36vw, 320px);
        height: auto;
        max-height: 72vh;
        object-fit: contain;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: #000;
      }
    </style>
  </head>
  <body>
    <div id="viewport">
      <div id="loading">
        <img src="loading-artwork.jpg" alt="Loading artwork">
      </div>
      <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="0"></canvas>
    </div>

    <script>
      const loadingElement = document.getElementById('loading');
      const canvasElement = document.getElementById('canvas');
      const minimumLoadingDurationMs = 3000;
      const loadingStartedAt = Date.now();
      const scrollBlockingKeys = new Set([
        'ArrowUp',
        'ArrowDown',
        'ArrowLeft',
        'ArrowRight',
        ' ',
        'PageUp',
        'PageDown',
        'Home',
        'End'
      ]);
      let appReadyToShow = false;
      let loadingHidden = false;

      canvasElement.addEventListener('webglcontextlost', (event) => {
        console.error('WebGL context lost. Reload the page to restore it.');
        event.preventDefault();
      }, false);

      function focusCanvas() {
        canvasElement.focus({ preventScroll: true });
      }

      window.addEventListener('pointerdown', focusCanvas, { passive: true });
      window.addEventListener('touchstart', focusCanvas, { passive: true });
      window.addEventListener('keydown', (event) => {
        if (scrollBlockingKeys.has(event.key)) {
          event.preventDefault();
          focusCanvas();
        }
      }, { capture: true });

      focusCanvas();

      function hideLoading() {
        if (loadingHidden) return;
        loadingHidden = true;
        loadingElement.classList.add('is-hidden');
      }

      function tryHideLoading() {
        if (!appReadyToShow) return;

        const elapsed = Date.now() - loadingStartedAt;
        const remaining = minimumLoadingDurationMs - elapsed;

        if (remaining > 0) {
          window.setTimeout(hideLoading, remaining);
          return;
        }

        hideLoading();
      }

      function markAppReady() {
        if (appReadyToShow) return;
        appReadyToShow = true;
        tryHideLoading();
      }

      var Module = {
        canvas: canvasElement,
        print(...args) {
          console.log(...args);
        },
        setStatus(text) {
          if (text) console.log(text);
        },
        totalDependencies: 0,
        monitorRunDependencies(left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          if (left === 0) markAppReady();
        },
        onRuntimeInitialized() {
          markAppReady();
        }
      };

      window.onerror = (message) => {
        console.error(message);
      };
    </script>
    {{{ SCRIPT }}}
  </body>
</html>
