<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gallery</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      body {
        display: grid;
        place-items: center;
      }

      #viewport {
        position: relative;
        width: min(100vw, 800px, calc(100vh * 4 / 3));
        aspect-ratio: 4 / 3;
        max-width: 800px;
        max-height: 600px;
        overflow: hidden;
      }

      #loading {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0b0b0b;
        z-index: 2;
        transition: opacity 220ms ease;
      }

      #loading.is-hidden {
        opacity: 0;
        pointer-events: none;
      }

      #loading img {
        display: block;
        width: min(36vw, 320px);
        height: auto;
        max-height: 72vh;
        object-fit: contain;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: #000;
      }
    </style>
  </head>
  <body>
    <div id="viewport">
      <div id="loading">
        <img src="loading-artwork.jpg" alt="Loading artwork">
      </div>
      <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    </div>

    <script>
      const loadingElement = document.getElementById('loading');
      const canvasElement = document.getElementById('canvas');

      canvasElement.addEventListener('webglcontextlost', (event) => {
        console.error('WebGL context lost. Reload the page to restore it.');
        event.preventDefault();
      }, false);

      function hideLoading() {
        loadingElement.classList.add('is-hidden');
      }

      var Module = {
        canvas: canvasElement,
        print(...args) {
          console.log(...args);
        },
        setStatus(text) {
          if (text) console.log(text);
        },
        totalDependencies: 0,
        monitorRunDependencies(left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          if (left === 0) hideLoading();
        },
        onRuntimeInitialized() {
          hideLoading();
        }
      };

      window.onerror = (message) => {
        console.error(message);
      };
    </script>
    {{{ SCRIPT }}}
  </body>
</html>
