name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install Emscripten SDK
        shell: bash
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git "$RUNNER_TEMP/emsdk"
          cd "$RUNNER_TEMP/emsdk"
          ./emsdk install latest
          ./emsdk activate latest
          echo "EMSDK=$RUNNER_TEMP/emsdk" >> "$GITHUB_ENV"

      - name: Build web bundle
        shell: bash
        run: |
          source "$EMSDK/emsdk_env.sh"
          emcmake cmake -S . -B build-web -DPLATFORM=Web -DCMAKE_BUILD_TYPE=Release
          cmake --build build-web

      - name: Prepare Pages artifact
        shell: bash
        run: |
          mkdir -p site
          cp build-web/animation.html site/animation.html
          cp build-web/animation.html site/index.html
          cp build-web/animation.js site/animation.js
          cp build-web/animation.wasm site/animation.wasm
          cp build-web/animation.data site/animation.data
          touch site/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
